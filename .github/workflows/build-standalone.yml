name: Build Standalone (单机版)

on:
  workflow_dispatch:   # 在 Actions 页面手动触发
  push:
    tags:
      - "standalone-*"   # 推 tag（如 standalone-v1.0.0）自动触发

jobs:
  # ── macOS DMG ─────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: standalone
        run: pip install pyinstaller pyqt6 pyaudio numpy faster-whisper

      # 缓存 Whisper small 模型（避免每次重新下载 ~500 MB）
      - name: Cache Whisper model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: whisper_models
          key: whisper-small-v1

      - name: Download Whisper small model (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        working-directory: standalone
        run: python prepare_model.py --size small --download

      - name: Prepare bundled model
        working-directory: standalone
        run: python prepare_model.py --size small

      - name: Build .app
        working-directory: standalone
        run: pyinstaller --noconfirm --clean 飞飞转录.spec

      - name: Create DMG
        working-directory: standalone
        run: |
          APP="dist/飞飞转录.app"
          DMG="dist/飞飞转录单机版.dmg"
          STAGING="dist/_dmg_staging"

          xattr -cr "$APP"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          cat > "$STAGING/安装说明.txt" << 'TXT'
          飞飞转录 · 单机版

          安装：把「飞飞转录.app」拖入「Applications」文件夹。
          ✅ 单机版无需服务端，模型已内置，首次启动约需 5-15 秒加载模型。

          首次打开提示"无法验证开发者"时：
            右键点击 .app → 选「打开」→ 弹窗里点「打开」
          TXT

          hdiutil create \
            -srcfolder "$STAGING" \
            -volname   "飞飞转录单机版" \
            -fs        HFS+ \
            -format    UDZO \
            -imagekey  zlib-level=6 \
            -ov        "$DMG"

          rm -rf "$STAGING"
          echo "DMG size: $(du -sh $DMG | awk '{print $1}')"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: 飞飞转录单机版-macOS
          path: standalone/dist/飞飞转录单机版.dmg
          retention-days: 30

  # ── Windows Setup.exe ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: standalone
        run: pip install pyinstaller pyqt6 pyaudio numpy faster-whisper

      # 缓存 Whisper small 模型
      - name: Cache Whisper model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: whisper_models
          key: whisper-small-v1

      - name: Download Whisper small model (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        working-directory: standalone
        run: python prepare_model.py --size small --download

      - name: Prepare bundled model
        working-directory: standalone
        run: python prepare_model.py --size small

      - name: Build exe
        working-directory: standalone
        run: pyinstaller --noconfirm --clean 飞飞转录.spec

      - name: Build installer (Inno Setup)
        working-directory: standalone
        shell: powershell
        run: |
          # GitHub Actions windows-latest 内置 Inno Setup
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            Write-Host "→ 使用 Inno Setup 制作安装包…"
            & $iscc installer.iss
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ 安装包制作完成"
            } else {
              Write-Host "❌ Inno Setup 失败，退出码 $LASTEXITCODE"
              exit 1
            }
          } else {
            Write-Host "Inno Setup 未找到，改用 ZIP 打包…"
            $src = "dist\飞飞转录"
            $zip = "dist\飞飞转录单机版.zip"
            @"
飞飞转录单机版 v1.0.0

使用方法：
  1. 解压本 ZIP 到任意目录
  2. 运行「飞飞转录.exe」
  3. 首次启动约需 5-15 秒加载模型，请耐心等待
  4. 完全无需服务端，模型已内置

"@ | Out-File -FilePath "$src\使用说明.txt" -Encoding UTF8
            Compress-Archive -Path "$src\*" -DestinationPath $zip -Force
            Write-Host "✅ ZIP 打包完成：$zip"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: 飞飞转录单机版-Windows
          path: |
            standalone/dist/飞飞转录单机版_Setup_*.exe
            standalone/dist/飞飞转录单机版.zip
          retention-days: 30

  # ── 发布 Release（仅 tag 触发）─────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 飞飞转录单机版 ${{ github.ref_name }}
          body: |
            ## 飞飞转录单机版

            **内置 Whisper small 模型，无需服务端，开箱即用。**

            ### 安装说明
            - **macOS**：打开 DMG，拖入 Applications 文件夹
            - **Windows**：运行 `飞飞转录单机版_Setup_*.exe` 按提示安装

            > 首次启动约需 5–15 秒加载模型，请耐心等待。
          files: |
            artifacts/飞飞转录单机版-macOS/飞飞转录单机版.dmg
            artifacts/飞飞转录单机版-Windows/飞飞转录单机版_Setup_*.exe
            artifacts/飞飞转录单机版-Windows/飞飞转录单机版.zip
          generate_release_notes: false
          draft: false
          prerelease: false
