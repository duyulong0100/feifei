name: Build Standalone (单机版)

on:
  workflow_dispatch:
  push:
    tags:
      - "standalone-*"

jobs:
  # ── macOS DMG ─────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (portaudio for pyaudio)
        run: brew install portaudio

      - name: Install Python dependencies
        working-directory: standalone
        run: pip install pyinstaller pyqt6 pyaudio numpy faster-whisper

      - name: Cache Whisper model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: whisper_models
          key: whisper-small-macos-v1

      - name: Download Whisper small model (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        working-directory: standalone
        run: python prepare_model.py --size small --download

      - name: Prepare bundled model
        working-directory: standalone
        run: python prepare_model.py --size small

      - name: Build .app
        working-directory: standalone
        run: pyinstaller --noconfirm --clean "飞飞转录.spec"

      - name: Create DMG
        working-directory: standalone
        run: |
          APP="dist/飞飞转录.app"
          DMG="dist/飞飞转录单机版.dmg"
          STAGING="dist/_staging"

          xattr -cr "$APP"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -srcfolder "$STAGING" \
            -volname   "飞飞转录单机版" \
            -fs        HFS+ \
            -format    UDZO \
            -imagekey  zlib-level=6 \
            -ov        "$DMG"

          rm -rf "$STAGING"
          du -sh "$DMG"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: 飞飞转录单机版-macOS
          path: standalone/dist/飞飞转录单机版.dmg
          retention-days: 30

  # ── Windows Setup.exe ────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    env:
      PYTHONUTF8: "1"      # 强制 Python 使用 UTF-8，避免 Unicode 字符输出报错
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 设置控制台编码为 UTF-8，避免中文路径问题
      - name: Set UTF-8 encoding
        run: chcp 65001

      - name: Install Python dependencies
        working-directory: standalone
        run: pip install pyinstaller pyqt6 pyaudio numpy faster-whisper

      - name: Cache Whisper model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: whisper_models
          key: whisper-small-windows-v1

      - name: Download Whisper small model (if not cached)
        if: steps.model-cache.outputs.cache-hit != 'true'
        working-directory: standalone
        run: python prepare_model.py --size small --download

      - name: Prepare bundled model
        working-directory: standalone
        run: python prepare_model.py --size small

      # Windows 下用 Python 调用 PyInstaller 避免中文文件名编码问题
      - name: Build exe
        working-directory: standalone
        run: python -m PyInstaller --noconfirm --clean "飞飞转录.spec"

      - name: Install Inno Setup
        run: |
          curl -L -o innosetup.exe https://jrsoftware.org/download.php/is.exe
          innosetup.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-
          echo "C:\Program Files (x86)\Inno Setup 6" >> %GITHUB_PATH%

      - name: Build installer
        working-directory: standalone
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            Write-Host "→ 制作 Windows 安装包..."
            & $iscc installer.iss
            if ($LASTEXITCODE -ne 0) { throw "Inno Setup 失败" }
            Write-Host "✅ 安装包制作完成"
          } else {
            Write-Host "⚠ Inno Setup 未找到，改用 ZIP 打包"
            $src = "dist\飞飞转录"
            $zip = "dist\飞飞转录单机版.zip"
            Set-Content -Path "$src\使用说明.txt" -Encoding UTF8 -Value "飞飞转录单机版`n`n使用方法：解压后运行 飞飞转录.exe`n首次启动约需 5-15 秒加载模型。"
            Compress-Archive -Path "$src\*" -DestinationPath $zip -Force
            Write-Host "✅ ZIP 打包完成"
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: 飞飞转录单机版-Windows
          path: |
            standalone/dist/飞飞转录单机版_Setup_*.exe
            standalone/dist/飞飞转录单机版.zip
          retention-days: 30

  # ── 发布 Release（仅 tag 触发）─────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 飞飞转录单机版 ${{ github.ref_name }}
          body: |
            ## 飞飞转录单机版

            内置 Whisper small 模型，无需服务端，开箱即用。

            - **macOS**：打开 DMG，拖入 Applications 文件夹
            - **Windows**：运行 `飞飞转录单机版_Setup_*.exe` 安装

            > 首次启动约需 5–15 秒加载模型，请耐心等待。
          files: |
            artifacts/飞飞转录单机版-macOS/飞飞转录单机版.dmg
            artifacts/飞飞转录单机版-Windows/飞飞转录单机版_Setup_*.exe
            artifacts/飞飞转录单机版-Windows/飞飞转录单机版.zip
          draft: false
          prerelease: false
