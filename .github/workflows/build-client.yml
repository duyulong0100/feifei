name: Build Client

on:
  push:
    tags:
      - "v*"          # 推 tag（如 v2.0.0）时自动触发
  workflow_dispatch:  # 也支持在 Actions 页面手动触发

jobs:
  # ── macOS DMG ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: client
        run: pip install pyinstaller pyqt6 pyaudio requests numpy

      - name: Build .app + DMG
        working-directory: client
        run: |
          pyinstaller --noconfirm --clean 飞飞转录.spec
          # 制作 DMG
          mkdir -p dist/_dmg
          cp -R dist/飞飞转录.app dist/_dmg/
          ln -s /Applications dist/_dmg/Applications
          hdiutil create \
            -srcfolder dist/_dmg \
            -volname "飞飞转录" \
            -fs HFS+ -format UDZO -ov \
            dist/飞飞转录.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: 飞飞转录-macOS
          path: client/dist/飞飞转录.dmg

  # ── Windows ZIP ───────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: client
        run: pip install pyinstaller pyqt6 pyaudio requests numpy

      - name: Build exe
        working-directory: client
        run: pyinstaller --noconfirm --clean 飞飞转录.spec

      - name: Create ZIP
        working-directory: client
        shell: powershell
        run: |
          $src = "dist\飞飞转录"
          $zip = "dist\飞飞转录_Windows.zip"
          @"
          飞飞转录客户端 Windows 版
          运行前请确保服务端已启动：python server/run.py
          "@ | Out-File -FilePath "$src\使用说明.txt" -Encoding UTF8
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: 飞飞转录-Windows
          path: client/dist/飞飞转录_Windows.zip

  # ── 发布 Release（仅 tag 触发）───────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/飞飞转录-macOS/飞飞转录.dmg
            artifacts/飞飞转录-Windows/飞飞转录_Windows.zip
          generate_release_notes: true
